<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Section padding</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; min-height: 260px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .meta { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted-foreground); font-variant-numeric: tabular-nums; }
</style>
</head><body><div class="card"><div style="width:100%;display:flex;flex-direction:column;gap:14px;">
     <div class="meta">Desktop · 96 × 56</div>
     <div style="background:var(--c-background-soft);border:1px dashed var(--c-border);position:relative;padding:24px 14px;border-radius:14px;">
       <div style="background:#fff;border:1px solid var(--c-border);height:34px;border-radius:8px;display:flex;align-items:center;padding:0 12px;font-size:12px;color:var(--c-muted-foreground);">content max-width 1280</div>
     </div>
     <div class="meta">Mobile · 64 × 20</div>
     <div style="background:var(--c-background-soft);border:1px dashed var(--c-border);position:relative;padding:14px 6px;border-radius:14px;width:240px;">
       <div style="background:#fff;border:1px solid var(--c-border);height:28px;border-radius:8px;display:flex;align-items:center;padding:0 10px;font-size:11px;color:var(--c-muted-foreground);">content</div>
     </div>
   </div></div></body></html>
