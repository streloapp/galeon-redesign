<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Type scale (desktop)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-fg); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; min-height: 320px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .meta { font-size: 11px; color: var(--c-muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted); font-variant-numeric: tabular-nums; }
</style>
</head><body><div class="card"><div style="width:100%;display:flex;flex-direction:column;gap:8px;">
     <div style="display:grid;grid-template-columns:1fr 80px;gap:10px;align-items:baseline;">
       <span style="font-weight:600;font-size:80px;line-height:0.96;letter-spacing:-0.045em;">H1 Hero</span>
       <span class="hex">80–132 px</span>
     </div>
     <div style="display:grid;grid-template-columns:1fr 80px;gap:10px;align-items:baseline;">
       <span style="font-weight:600;font-size:52px;line-height:0.98;letter-spacing:-0.035em;">H2 Section title</span>
       <span class="hex">52–64 px</span>
     </div>
     <div style="display:grid;grid-template-columns:1fr 80px;gap:10px;align-items:baseline;">
       <span style="font-weight:600;font-size:30px;letter-spacing:-0.025em;line-height:1.15;">H3 Subhead</span>
       <span class="hex">30–44 px</span>
     </div>
     <div style="display:grid;grid-template-columns:1fr 80px;gap:10px;align-items:baseline;">
       <span style="font-size:16px;line-height:1.45;color:var(--c-muted);">Body — text-wrap:pretty</span>
       <span class="hex">15–19 px</span>
     </div>
     <div style="display:grid;grid-template-columns:1fr 80px;gap:10px;align-items:baseline;">
       <span class="ds-eyebrow">Eyebrow</span>
       <span class="hex">12 px</span>
     </div>
   </div></div></body></html>
