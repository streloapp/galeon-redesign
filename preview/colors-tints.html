<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Scrim & service tints</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .grp-label { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { border-radius: 12px; border: 1px solid var(--c-border); overflow: hidden; width: 150px; }
  .sw .chip { height: 56px; display: flex; align-items: flex-end; padding: 8px; }
  .sw .cap { padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
  .sw .name { font-size: 12px; font-weight: 600; }
  .sw .tok { font-size: 11px; color: var(--c-muted-foreground); font-variant-numeric: tabular-nums; }
  /* scrim demo over a fake photo */
  .scrim-demo { position: relative; height: 80px; border-radius: 12px; overflow: hidden; background: linear-gradient(120deg,#5a5a55,#2b2b28); }
  .scrim-demo .ov { position: absolute; inset: 0; background: linear-gradient(100deg, color-mix(in srgb, var(--c-scrim) 72%, transparent), color-mix(in srgb, var(--c-scrim) 0%, transparent) 75%); }
  .scrim-demo .lbl { position: absolute; left: 10px; bottom: 8px; color: var(--c-on-media); font-size: 12px; font-weight: 600; }
</style>
</head><body>
  <div class="wrap">
    <div>
      <div class="grp-label">Scrim · --c-scrim (#15110D) · aplicado com alpha via color-mix</div>
      <div class="scrim-demo"><div class="ov"></div><div class="lbl">texto legível sobre foto/vídeo</div></div>
    </div>
    <div>
      <div class="grp-label">Service tints · superfícies tonais de card</div>
      <div class="row">
        <div class="sw">
          <div class="chip" style="background:var(--c-sala-vip-tint);border-bottom:1px solid var(--c-sala-vip-tint-border);">
            <span style="font-size:11px;font-weight:600;color:var(--c-sala-vip);">Sala VIP</span>
          </div>
          <div class="cap"><span class="name">Sala VIP tint</span><span class="tok">--c-sala-vip-tint</span></div>
        </div>
        <div class="sw">
          <div class="chip" style="background:var(--c-transportes-tint);border-bottom:1px solid var(--c-transportes-tint-border);">
            <span style="font-size:11px;font-weight:600;color:var(--c-transportes-strong);">Transportes</span>
          </div>
          <div class="cap"><span class="name">Transportes tint</span><span class="tok">--c-transportes-tint</span></div>
        </div>
      </div>
    </div>
  </div>
</body></html>
