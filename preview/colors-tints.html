<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Scrim · --c-scrim</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .grp-label { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
  /* scrim demo over a fake photo */
  .scrim-demo { position: relative; height: 96px; border-radius: 12px; overflow: hidden; background: linear-gradient(120deg,#5a5a55,#2b2b28); }
  .scrim-demo .ov { position: absolute; inset: 0; background: linear-gradient(100deg, color-mix(in srgb, var(--c-scrim) 72%, transparent), color-mix(in srgb, var(--c-scrim) 0%, transparent) 75%); }
  .scrim-demo .lbl { position: absolute; left: 12px; bottom: 10px; color: var(--c-on-media); font-size: 12px; font-weight: 600; }
  .note { font-size: 12px; color: var(--c-muted-foreground); line-height: 1.5; max-width: 460px; }
</style>
</head><body>
  <div class="wrap">
    <div>
      <div class="grp-label">Scrim · --c-scrim (#15110D) · aplicado com alpha via color-mix</div>
      <div class="scrim-demo"><div class="ov"></div><div class="lbl">texto legível sobre foto/vídeo</div></div>
    </div>
    <div class="note">Base quase-preta morna, nunca preto puro. Toda copy sobre fotografia/vídeo senta num gradiente de --c-scrim — a intensidade (%) varia por contexto, a cor não.</div>
  </div>
</body></html>
