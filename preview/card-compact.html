<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Compact service card</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; min-height: 220px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .meta { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted-foreground); font-variant-numeric: tabular-nums; }
  .gl-btn {
    display: inline-flex; align-items: center; gap: 10px;
    height: 52px; padding: 0 22px; border-radius: 999px;
    border: 1px solid transparent; font-weight: 600; font-size: 15px;
    letter-spacing: -0.005em; cursor: pointer; font-family: inherit;
    white-space: nowrap; transition: transform .15s ease, background .15s ease;
  }
  .gl-btn:hover { transform: translateY(-1px); }
  .gl-btn--primary { background: var(--c-primary); color: var(--c-primary-foreground); }
  .gl-btn--dark { background: var(--c-foreground); color: #fff; }
  .gl-btn--ghost { background: transparent; color: var(--c-foreground); border-color: var(--c-foreground); }
  .gl-btn--sm { height: 40px; padding: 0 16px; font-size: 13px; }
  .gl-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(255,255,255,0.92);
    color: var(--c-foreground);
    border: 1px solid var(--c-border);
  }
  .gl-tag .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .gl-tabs { display: inline-flex; padding: 4px; background: var(--c-background-soft); border-radius: 999px; gap: 2px; border: 1px solid var(--c-border); }
  .gl-tab { background: transparent; border: 0; height: 38px; padding: 0 18px; border-radius: 999px; font-weight: 500; font-size: 14px; color: var(--c-muted-foreground); font-family: inherit; cursor: pointer; }
  .gl-tab[data-active="true"] { background: var(--c-foreground); color: #fff; }
  .arrow { width: 14px; height: 14px; }
</style>
</head><body><div class="card"><div style="display:flex;gap:14px;width:100%;">
     
       <article style="flex:1;border-radius:22px;padding:18px;background:#fff;border:1px solid var(--c-border);display:flex;flex-direction:column;gap:12px;min-height:140px;">
         <div style="display:flex;align-items:center;justify-content:space-between;">
           <span style="display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--c-guarda);">
             <span style="width:8px;height:8px;border-radius:4px;background:var(--c-guarda);box-shadow:0 0 0 4px var(--c-guarda)22;"></span>Guarda-volume
           </span>
           <span style="color:var(--c-muted-foreground);"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></span>
         </div>
         <p style="margin:0;font-size:15px;font-weight:500;letter-spacing:-0.01em;line-height:1.3;flex:1;">Deixe a bagagem em segurança.</p>
       </article>
       <article style="flex:1;border-radius:22px;padding:18px;background:#fff;border:1px solid var(--c-border);display:flex;flex-direction:column;gap:12px;min-height:140px;">
         <div style="display:flex;align-items:center;justify-content:space-between;">
           <span style="display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--c-cambio);">
             <span style="width:8px;height:8px;border-radius:4px;background:var(--c-cambio);box-shadow:0 0 0 4px var(--c-cambio)22;"></span>Câmbio
           </span>
           <span style="color:var(--c-muted-foreground);"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></span>
         </div>
         <p style="margin:0;font-size:15px;font-weight:500;letter-spacing:-0.01em;line-height:1.3;flex:1;">Troque moeda sem fila.</p>
       </article>
       <article style="flex:1;border-radius:22px;padding:18px;background:#fff;border:1px solid var(--c-border);display:flex;flex-direction:column;gap:12px;min-height:140px;">
         <div style="display:flex;align-items:center;justify-content:space-between;">
           <span style="display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--c-personal);">
             <span style="width:8px;height:8px;border-radius:4px;background:var(--c-personal);box-shadow:0 0 0 4px var(--c-personal)22;"></span>Personal Shopper
           </span>
           <span style="color:var(--c-muted-foreground);"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></span>
         </div>
         <p style="margin:0;font-size:15px;font-weight:500;letter-spacing:-0.01em;line-height:1.3;flex:1;">Alguém compra por você.</p>
       </article>
   </div></div></body></html>
