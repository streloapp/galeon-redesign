<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Brand primary</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-fg); -webkit-font-smoothing: antialiased; }
  .card { width: 100%; min-height: 210px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .swatch { width: 100%; height: 100%; border-radius: 14px; }
  .meta { font-size: 12px; color: var(--c-muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted); font-variant-numeric: tabular-nums; }
  .label { font-size: 13px; font-weight: 500; }
  .grid { display: grid; gap: 12px; width: 100%; }
</style>
</head><body><div class="card"><div class="row" style="width:100%;gap:14px;">
     <div style="flex:2;background:var(--c-primary);border-radius:18px;height:160px;display:flex;align-items:flex-end;padding:18px;color:var(--c-primary-ink);">
       <div><div style="font-weight:600;font-size:18px;">GaleON green</div><div style="font-size:12px;font-variant-numeric:tabular-nums;opacity:.8;">#9ACA3C</div></div>
     </div>
     <div style="flex:1;background:var(--c-primary-ink);border-radius:18px;height:160px;display:flex;align-items:flex-end;padding:18px;color:var(--c-primary);">
       <div><div style="font-weight:600;font-size:14px;">Ink</div><div style="font-size:12px;font-variant-numeric:tabular-nums;opacity:.7;">#1f2a0c</div></div>
     </div>
   </div></div></body></html>
