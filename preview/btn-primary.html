<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Primary + size scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--c-background); font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; padding: 24px 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .meta { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .arrow { width: 14px; height: 14px; }
</style>
</head><body><div class="card">
   <div class="meta">Text sizes — xs 28 · sm 32 · default 36 · lg 40 px</div>
   <div class="row">
     <button class="gl-btn gl-btn--primary gl-btn--xs">xs</button>
     <button class="gl-btn gl-btn--primary gl-btn--sm">sm</button>
     <button class="gl-btn gl-btn--primary">default <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
     <button class="gl-btn gl-btn--primary gl-btn--lg">lg</button>
   </div>
   <div class="meta">Icon sizes — icon-xs 28 · icon-sm 32 · icon 36 · icon-lg 40 px</div>
   <div class="row">
     <button class="gl-btn gl-btn--primary gl-btn--icon-xs" aria-label="add"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
     <button class="gl-btn gl-btn--primary gl-btn--icon-sm" aria-label="add"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
     <button class="gl-btn gl-btn--primary gl-btn--icon" aria-label="add"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
     <button class="gl-btn gl-btn--primary gl-btn--icon-lg" aria-label="add"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
   </div>
   <div class="meta" style="text-transform:none;letter-spacing:0;">radius --r-lg (22px) · brand deviation from shadcn's rounded-md</div>
   </div></body></html>
