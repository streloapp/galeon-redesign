<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Service chip · .gl-svc-top-chip</title>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { width: 100%; min-height: 120px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .icon { display: inline-flex; align-items: center; }
</style>
</head><body><div class="galeao" style="background:#fff;width:100%;"><div class="card">
  <!-- Réplica do contêiner glass do hero (foto simulada pelo gradiente). -->
  <div style="position:relative;background:linear-gradient(120deg,#5a5a55,#2b2b28);border-radius:14px;padding:28px 18px 22px;width:100%;display:flex;justify-content:center;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);padding:var(--space-4);background:rgba(20,20,18,0.32);-webkit-backdrop-filter:blur(22px) saturate(180%);backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,0.14);box-shadow:0 10px 30px rgba(0,0,0,0.22);border-radius:var(--r-md);width:100%;max-width:640px;">
      <button class="gl-svc-top-chip gl-svc-top-chip--bare" data-active="true" style="--chip-c:#fff;flex:1 1 auto;">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18h16"/><path d="M5 18a7 7 0 0 1 14 0"/><path d="M12 8V6"/><path d="M10 4h4"/></svg></span>
        <span>Meet &amp; Greet</span>
        <span class="gl-svc-progress"></span>
      </button>
      <button class="gl-svc-top-chip gl-svc-top-chip--bare" style="flex:1 1 auto;">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 10h14l-1.2 9.2A1.5 1.5 0 0 1 16.3 21H7.7a1.5 1.5 0 0 1-1.5-1.3L5 10z"/><path d="M5 10h14"/><path d="M9 7c0-1.5 1.5-2 1.5-3M14 7c0-1.5 1.5-2 1.5-3"/></svg></span>
        <span>Delivery</span>
      </button>
      <button class="gl-svc-top-chip gl-svc-top-chip--bare" style="flex:1 1 auto;">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14v-3a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3"/><path d="M3 14a2 2 0 0 1 2 2v2h14v-2a2 2 0 0 1 2-2"/><path d="M7 14V11"/><path d="M17 14V11"/></svg></span>
        <span>Sala VIP</span>
      </button>
    </div>
  </div>
</div></div></body></html>
