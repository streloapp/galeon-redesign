<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Partner marquee · monochrome logos</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; min-height: 120px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .meta { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted-foreground); font-variant-numeric: tabular-nums; }
  .gl-btn {
    display: inline-flex; align-items: center; gap: 10px;
    height: 52px; padding: 0 22px; border-radius: 999px;
    border: 1px solid transparent; font-weight: 600; font-size: 15px;
    letter-spacing: -0.005em; cursor: pointer; font-family: inherit;
    white-space: nowrap; transition: transform .15s ease, background .15s ease;
  }
  .gl-btn:hover { transform: translateY(-1px); }
  .gl-btn--primary { background: var(--c-primary); color: var(--c-primary-foreground); }
  .gl-btn--dark { background: var(--c-foreground); color: #fff; }
  .gl-btn--ghost { background: transparent; color: var(--c-foreground); border-color: var(--c-foreground); }
  .gl-btn--sm { height: 40px; padding: 0 16px; font-size: 13px; }
  .gl-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(255,255,255,0.92);
    color: var(--c-foreground);
    border: 1px solid var(--c-border);
  }
  .gl-tag .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .gl-tabs { display: inline-flex; padding: 4px; background: var(--c-background-soft); border-radius: 999px; gap: 2px; border: 1px solid var(--c-border); }
  .gl-tab { background: transparent; border: 0; height: 38px; padding: 0 18px; border-radius: 999px; font-weight: 500; font-size: 14px; color: var(--c-muted-foreground); font-family: inherit; cursor: pointer; }
  .gl-tab[data-active="true"] { background: var(--c-foreground); color: #fff; }
  .arrow { width: 14px; height: 14px; }
</style>
</head><body><div class="card"><div style="width:100%;padding:14px 0;overflow:hidden;mask-image:linear-gradient(90deg, transparent 0, #000 6%, #000 94%, transparent 100%);-webkit-mask-image:linear-gradient(90deg, transparent 0, #000 6%, #000 94%, transparent 100%);">
     <div style="display:flex;gap:56px;align-items:center;">
       <img src="https://cdn.simpleicons.org/starbucks/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/burgerking/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/mcdonalds/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/kfc/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/hilton/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/marriott/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/airbnb/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/visa/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/mastercard/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/><img src="https://cdn.simpleicons.org/loccitaneenprovence/000000" style="height:28px;width:auto;flex-shrink:0;opacity:0.7;filter:brightness(0);" alt=""/>
     </div>
   </div></div></body></html>
