<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Service-tinted (hero CTA)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--c-background); font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; min-height: 220px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .meta { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .arrow { width: 14px; height: 14px; }
</style>
</head><body><div class="card"><div style="display:flex;flex-direction:column;gap:10px;width:100%;">
     <div class="meta">.gl-btn--service — pass --btn-bg / --btn-fg (the service's own foreground)</div>
     <div style="display:flex;gap:10px;flex-wrap:wrap;">
       <button class="gl-btn gl-btn--service" style="--btn-bg:var(--c-meet-greet);--btn-fg:var(--c-meet-greet-foreground);">Garanta seu Meet &amp; Greet <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
       <button class="gl-btn gl-btn--service" style="--btn-bg:var(--c-delivery);--btn-fg:var(--c-delivery-foreground);">Peça no portão <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
       <button class="gl-btn gl-btn--service" style="--btn-bg:var(--c-sala-vip);--btn-fg:var(--c-sala-vip-foreground);">Reserve sua Sala VIP <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
       <button class="gl-btn gl-btn--service" style="--btn-bg:var(--c-transportes);--btn-fg:var(--c-transportes-foreground);">Reserve seu transfer <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
     </div>
     <div class="meta" style="margin-top:6px;text-transform:none;letter-spacing:0;">↑ Transportes (gold) gets dark text automatically via --c-transportes-foreground — no per-button override.</div>
   </div></div></body></html>
