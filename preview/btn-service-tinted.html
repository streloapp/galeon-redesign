<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Service-tinted (hero CTA)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-fg); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; min-height: 220px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .meta { font-size: 11px; color: var(--c-muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted); font-variant-numeric: tabular-nums; }
  .gl-btn {
    display: inline-flex; align-items: center; gap: 10px;
    height: 52px; padding: 0 22px; border-radius: 999px;
    border: 1px solid transparent; font-weight: 600; font-size: 15px;
    letter-spacing: -0.005em; cursor: pointer; font-family: inherit;
    white-space: nowrap; transition: transform .15s ease, background .15s ease;
  }
  .gl-btn:hover { transform: translateY(-1px); }
  .gl-btn--primary { background: var(--c-primary); color: var(--c-primary-ink); }
  .gl-btn--dark { background: var(--c-fg); color: #fff; }
  .gl-btn--ghost { background: transparent; color: var(--c-fg); border-color: var(--c-fg); }
  .gl-btn--sm { height: 40px; padding: 0 16px; font-size: 13px; }
  .gl-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(255,255,255,0.92);
    color: var(--c-fg);
    border: 1px solid var(--c-border);
  }
  .gl-tag .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .gl-tabs { display: inline-flex; padding: 4px; background: var(--c-bg-soft); border-radius: 999px; gap: 2px; border: 1px solid var(--c-border); }
  .gl-tab { background: transparent; border: 0; height: 38px; padding: 0 18px; border-radius: 999px; font-weight: 500; font-size: 14px; color: var(--c-muted); font-family: inherit; cursor: pointer; }
  .gl-tab[data-active="true"] { background: var(--c-fg); color: #fff; }
  .arrow { width: 14px; height: 14px; }
</style>
</head><body><div class="card"><div style="display:flex;flex-direction:column;gap:10px;width:100%;">
     <div class="meta">CTA takes the active service color</div>
     <div style="display:flex;gap:10px;flex-wrap:wrap;">
       <button class="gl-btn" style="background:var(--c-hospitalidade);color:#fff;">Garanta sua Hospitalidade <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
       <button class="gl-btn" style="background:var(--c-delivery);color:#fff;">Peça no portão <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
       <button class="gl-btn" style="background:var(--c-sala-vip);color:#fff;">Reserve sua Sala VIP <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
       <button class="gl-btn" style="background:var(--c-cambio);color:#fff;">Reserve seu câmbio <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
     </div>
   </div></div></body></html>
