<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Neutrals (warm)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; }
  .card { width: 100%; min-height: 200px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .swatch { width: 100%; height: 100%; border-radius: 14px; }
  .meta { font-size: 12px; color: var(--c-muted-foreground); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted-foreground); font-variant-numeric: tabular-nums; }
  .label { font-size: 13px; font-weight: 500; }
  .grid { display: grid; gap: 12px; width: 100%; }
</style>
</head><body><div class="card"><div class="row" style="width:100%;gap:10px;">
     
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;">
    <div style="background:#FFFFFF;border-radius:14px;height:90px;border:1px solid var(--c-border);"></div>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div class="label">bg</div>
      <div class="hex">#FFFFFF</div>
    </div>
  </div>
     
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;">
    <div style="background:#F7F7F4;border-radius:14px;height:90px;border:1px solid var(--c-border);"></div>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div class="label">bg-soft</div>
      <div class="hex">#F7F7F4</div>
    </div>
  </div>
     
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;">
    <div style="background:#E7E6E1;border-radius:14px;height:90px;border:1px solid var(--c-border);"></div>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div class="label">border</div>
      <div class="hex">#E7E6E1</div>
    </div>
  </div>
     
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;">
    <div style="background:#6B6B68;border-radius:14px;height:90px;border:1px solid var(--c-border);"></div>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div class="label">muted</div>
      <div class="hex">#6B6B68</div>
    </div>
  </div>
     
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;">
    <div style="background:#0E0F0E;border-radius:14px;height:90px;border:1px solid var(--c-border);"></div>
    <div style="display:flex;flex-direction:column;gap:2px;">
      <div class="label">fg</div>
      <div class="hex">#0E0F0E</div>
    </div>
  </div>
   </div></div></body></html>
