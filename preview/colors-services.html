<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Service palette · one color per offering</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-fg); -webkit-font-smoothing: antialiased; }
  .card { width: 100%; min-height: 220px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .swatch { width: 100%; height: 100%; border-radius: 14px; }
  .meta { font-size: 12px; color: var(--c-muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted); font-variant-numeric: tabular-nums; }
  .label { font-size: 13px; font-weight: 500; }
  .grid { display: grid; gap: 12px; width: 100%; }
</style>
</head><body><div class="card"><div class="grid" style="grid-template-columns:repeat(7,1fr);">
     
       <div style="display:flex;flex-direction:column;gap:8px;">
         <div style="background:#2B2B2B;border-radius:14px;height:90px;"></div>
         <div style="font-size:11px;font-weight:500;letter-spacing:-0.005em;">Hospitalidade</div>
         <div class="hex">#2B2B2B</div>
       </div>
       <div style="display:flex;flex-direction:column;gap:8px;">
         <div style="background:#ED1C24;border-radius:14px;height:90px;"></div>
         <div style="font-size:11px;font-weight:500;letter-spacing:-0.005em;">Delivery</div>
         <div class="hex">#ED1C24</div>
       </div>
       <div style="display:flex;flex-direction:column;gap:8px;">
         <div style="background:#822A85;border-radius:14px;height:90px;"></div>
         <div style="font-size:11px;font-weight:500;letter-spacing:-0.005em;">Sala VIP</div>
         <div class="hex">#822A85</div>
       </div>
       <div style="display:flex;flex-direction:column;gap:8px;">
         <div style="background:#C58200;border-radius:14px;height:90px;"></div>
         <div style="font-size:11px;font-weight:500;letter-spacing:-0.005em;">Transportes</div>
         <div class="hex">#C58200</div>
       </div>
       <div style="display:flex;flex-direction:column;gap:8px;">
         <div style="background:#F58220;border-radius:14px;height:90px;"></div>
         <div style="font-size:11px;font-weight:500;letter-spacing:-0.005em;">Guarda-volume</div>
         <div class="hex">#F58220</div>
       </div>
       <div style="display:flex;flex-direction:column;gap:8px;">
         <div style="background:#009B90;border-radius:14px;height:90px;"></div>
         <div style="font-size:11px;font-weight:500;letter-spacing:-0.005em;">Câmbio</div>
         <div class="hex">#009B90</div>
       </div>
       <div style="display:flex;flex-direction:column;gap:8px;">
         <div style="background:#ED0080;border-radius:14px;height:90px;"></div>
         <div style="font-size:11px;font-weight:500;letter-spacing:-0.005em;">Personal</div>
         <div class="hex">#ED0080</div>
       </div>
   </div></div></body></html>
