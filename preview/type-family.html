<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Plus Jakarta Sans · primary typeface</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-fg); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; min-height: 220px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .meta { font-size: 11px; color: var(--c-muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted); font-variant-numeric: tabular-nums; }
</style>
</head><body><div class="card"><div style="width:100%;display:flex;flex-direction:column;gap:14px;">
     <div style="display:flex;align-items:baseline;gap:18px;">
       <div style="font-weight:600;font-size:80px;line-height:0.92;letter-spacing:-0.04em;">Aa</div>
       <div style="display:flex;flex-direction:column;gap:4px;">
         <div style="font-size:14px;font-weight:500;">Plus Jakarta Sans</div>
         <div class="meta">Google Fonts · weights 400 / 500 / 600 / 700 / 800</div>
       </div>
     </div>
     <div style="display:flex;gap:18px;font-size:18px;letter-spacing:-0.01em;">
       <span style="font-weight:400;">Regular</span>
       <span style="font-weight:500;">Medium</span>
       <span style="font-weight:600;">Semibold</span>
       <span style="font-weight:700;">Bold</span>
       <span style="font-weight:800;">Extrabold</span>
     </div>
   </div></div></body></html>
