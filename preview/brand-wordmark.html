<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GaleON wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-fg); -webkit-font-smoothing: antialiased; }
  .card { width: 100%; min-height: 170px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .swatch { width: 100%; height: 100%; border-radius: 14px; }
  .meta { font-size: 12px; color: var(--c-muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted); font-variant-numeric: tabular-nums; }
  .label { font-size: 13px; font-weight: 500; }
  .grid { display: grid; gap: 12px; width: 100%; }
</style>
</head><body><div class="card"><div class="col" style="gap:8px;justify-content:center;">
     <div style="font-weight:800;font-size:64px;letter-spacing:-0.04em;line-height:1;">Gale<span style="color:var(--c-primary);">ON</span></div>
     <div style="font-size:14px;color:var(--c-muted);">O RIOgaleão na palma da sua mão.</div>
   </div></div></body></html>
