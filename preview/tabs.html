<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tab pill · .gl-tabs / .gl-tab</title>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { width: 100%; min-height: 140px; padding: 24px 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; }
  .meta { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
</style>
</head><body><div class="galeao" style="background:#fff;"><div class="card">
  <div>
    <div class="meta" style="margin-bottom:10px;">Estado padrão — ativa em --c-primary</div>
    <div class="gl-tabs">
      <button class="gl-tab" data-active="true">Delivery</button>
      <button class="gl-tab">Sala VIP</button>
      <button class="gl-tab">Transportes</button>
    </div>
  </div>
  <div>
    <div class="meta" style="margin-bottom:10px;">Na Vitrine, a ativa recebe a cor do serviço via style inline</div>
    <div class="gl-tabs">
      <button class="gl-tab">Delivery</button>
      <button class="gl-tab" data-active="true" style="background:var(--c-sala-vip);color:var(--c-sala-vip-foreground);">Sala VIP</button>
      <button class="gl-tab">Transportes</button>
    </div>
  </div>
</div></div></body></html>
