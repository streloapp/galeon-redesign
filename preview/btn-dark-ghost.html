<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Buttons — dark · outline · ghost · link · icon · secondary</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--c-background); font-family: var(--font-body); color: var(--c-foreground); -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","ss02"; }
  .card { width: 100%; padding: 24px 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .meta { font-size: 11px; color: var(--c-muted-foreground); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .dark { background: var(--c-surface-dark); border-radius: var(--r-lg); padding: 20px 24px; }
  .arrow { width: 14px; height: 14px; }
</style>
</head><body><div class="card">
   <div class="meta">On light surface</div>
   <div class="row">
     <button class="gl-btn gl-btn--dark">Dark <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
     <button class="gl-btn gl-btn--destructive">Destructive</button>
     <button class="gl-btn gl-btn--outline">Outline</button>
     <button class="gl-btn gl-btn--ghost">Ghost</button>
     <button class="gl-btn gl-btn--link">Link &rarr;</button>
     <button class="gl-btn gl-btn--ghost gl-btn--icon" aria-label="Menu"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 8h16"/><path d="M4 16h16"/></svg></button>
   </div>
   <div class="meta">On dark surface — .gl-btn--secondary (light pill)</div>
   <div class="dark row">
     <button class="gl-btn gl-btn--secondary">Saber mais <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg></button>
     <button class="gl-btn gl-btn--secondary gl-btn--sm">Compact</button>
   </div>
   </div></body></html>
