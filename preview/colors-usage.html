<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Where service color appears</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--c-fg); -webkit-font-smoothing: antialiased; }
  .card { width: 100%; min-height: 220px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .swatch { width: 100%; height: 100%; border-radius: 14px; }
  .meta { font-size: 12px; color: var(--c-muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex { font-size: 12px; color: var(--c-muted); font-variant-numeric: tabular-nums; }
  .label { font-size: 13px; font-weight: 500; }
  .grid { display: grid; gap: 12px; width: 100%; }
</style>
</head><body><div class="card"><div class="col" style="width:100%;gap:18px;">
     <div style="display:flex;align-items:center;gap:14px;">
       <span style="display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--c-delivery);">
         <span style="width:7px;height:7px;border-radius:50%;background:currentColor;"></span> Delivery
       </span>
       <span style="font-size:13px;color:var(--c-muted);">Tag chip dot + active hero CTA</span>
     </div>
     <div style="display:flex;gap:12px;align-items:center;">
       <button style="display:inline-flex;align-items:center;gap:10px;height:46px;padding:0 20px;border-radius:999px;border:0;background:var(--c-delivery);color:#fff;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;">Peça no portão →</button>
       <button style="display:inline-flex;align-items:center;gap:10px;height:46px;padding:0 20px;border-radius:999px;border:0;background:var(--c-sala-vip);color:#fff;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;">Reserve Sala VIP →</button>
       <button style="display:inline-flex;align-items:center;gap:10px;height:46px;padding:0 20px;border-radius:999px;border:0;background:var(--c-cambio);color:#fff;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;">Reserve câmbio →</button>
     </div>
     <div style="font-size:12px;color:var(--c-muted);line-height:1.5;">A cor segue o serviço — não mistura por estética. Cada CTA, chip e bullet usa o token da sua categoria.</div>
   </div></div></body></html>
