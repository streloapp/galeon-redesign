<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Color usage · a cor segue o serviço</title>
<link rel="stylesheet" href="../styles.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { width: 100%; min-height: 200px; padding: 24px 28px; box-sizing: border-box; display: flex; }
  .svc-tag { display: inline-flex; align-items: center; gap: var(--space-8); font-size: var(--text-micro); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head><body><div class="galeao" style="background:#fff;"><div class="card"><div style="display:flex;flex-direction:column;gap:18px;width:100%;">
  <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;">
    <span class="svc-tag" style="color:var(--c-delivery);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 10h14l-1.2 9.2A1.5 1.5 0 0 1 16.3 21H7.7a1.5 1.5 0 0 1-1.5-1.3L5 10z"/><path d="M5 10h14"/><path d="M9 7c0-1.5 1.5-2 1.5-3M14 7c0-1.5 1.5-2 1.5-3"/></svg> Delivery</span>
    <span class="svc-tag" style="color:var(--c-sala-vip);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14v-3a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3"/><path d="M3 14a2 2 0 0 1 2 2v2h14v-2a2 2 0 0 1 2-2"/><path d="M7 14V11"/><path d="M17 14V11"/></svg> Sala VIP</span>
    <span style="font-size:13px;color:var(--c-muted-foreground);">Tag de serviço (ícone + label na cor do serviço)</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button class="gl-btn gl-btn--service" style="--btn-bg:var(--c-delivery);--btn-fg:var(--c-delivery-foreground);">Peça no portão</button>
    <button class="gl-btn gl-btn--service" style="--btn-bg:var(--c-sala-vip);--btn-fg:var(--c-sala-vip-foreground);">Reserve Sala VIP</button>
    <button class="gl-btn gl-btn--service" style="--btn-bg:var(--c-cambio);--btn-fg:var(--c-cambio-foreground);">Reserve câmbio</button>
  </div>
  <div style="font-size:12px;color:var(--c-muted-foreground);line-height:1.5;">A cor segue o serviço — não mistura por estética. Cada CTA, tag e bullet usa o token da sua categoria.</div>
</div></div></div></body></html>
