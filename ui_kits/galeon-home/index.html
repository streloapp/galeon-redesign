<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GaleON — Home (UI kit)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { margin: 0; height: 100%; background: #fff; font-family: "Plus Jakarta Sans", system-ui, sans-serif; }
    #root { min-height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="image-slot.js"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="viagem.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel">
    // Standalone mount of the GaleON HomePage — no design canvas chrome.
    // Width detection uses window.innerWidth so the page is responsive.
    function App() {
      const [w, setW] = React.useState(typeof window !== 'undefined' ? window.innerWidth : 1440);
      React.useEffect(() => {
        const onR = () => setW(window.innerWidth);
        window.addEventListener('resize', onR);
        return () => window.removeEventListener('resize', onR);
      }, []);
      return <window.GaleonHomePage width={w} heroVariant="split" />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
